name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build (manual runs)"
        type: choice
        default: all
        options:
          - all
          - linux
          - windows
          - macos

jobs:
  build-linux:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            mesa-common-dev libjack-jackd2-dev pkg-config

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 4

      - name: Run tests
        run: ./build/OpenSynth1Tests_artefacts/Release/OpenSynth1Tests

  build-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: ./build/OpenSynth1Tests_artefacts/Release/OpenSynth1Tests.exe

  build-macos:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    # Pinned to macos-14 (Xcode 15 / SDK 14): macos-latest is now macOS 15 /
    # Xcode 16, whose SDK obsoletes CGWindowListCreateImage, which JUCE 7.0.12
    # still uses — that breaks the juceaide build at Configure. Move back to
    # macos-latest after bumping JUCE to a macOS-15-SDK-compatible release.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: ./build/OpenSynth1Tests_artefacts/Release/OpenSynth1Tests
